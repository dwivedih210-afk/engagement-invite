<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ring Ceremony Invitation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Mrs+Saint+Delafield&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* =========================================================
     EDIT ME: colors live here. Change these 6 values and the
     whole card re-colors itself.
  ========================================================= */
  :root{
    --maroon:      #6d1f2b;   /* deep base color */
    --maroon-dark: #4a1420;   /* envelope shadow / footer */
    --gold:        #c9a24a;   /* borders, icons, accents */
    --gold-light:  #f3d98b;   /* shimmer highlight */
    --blush:       #fdece7;   /* soft card background */
    --cream:       #fff8ef;   /* page background */
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html{ scroll-behavior:smooth; }
  body{
    font-family:'Poppins', sans-serif;
    background:var(--cream);
    color:var(--maroon-dark);
    overflow-x:hidden;
  }
  .serif{ font-family:'Cormorant Garamond', serif; }
  .script{ font-family:'Mrs Saint Delafield', cursive; }

  section{ position:relative; width:100%; padding:70px 24px; text-align:center; overflow:hidden; }

  /* ---------- floating marigold petals (ambient motion) ---------- */
  .petals{ position:fixed; inset:0; pointer-events:none; z-index:5; }
  .petal{
    position:absolute; top:-40px; font-size:20px; opacity:.8;
    animation:fall linear infinite;
    color:var(--gold);
  }
  @keyframes fall{
    0%   { transform:translateY(0) rotate(0deg); opacity:.9; }
    100% { transform:translateY(110vh) rotate(360deg); opacity:0; }
  }

  /* ---------- corner mandala motif, reused on every section ---------- */
  .motif{ position:absolute; width:90px; height:90px; opacity:.35; }
  .motif.tl{ top:10px; left:10px; }
  .motif.tr{ top:10px; right:10px; transform:scaleX(-1); }
  .motif.bl{ bottom:10px; left:10px; transform:scaleY(-1); }
  .motif.br{ bottom:10px; right:10px; transform:scale(-1,-1); }

  /* =========================================================
     1. ENVELOPE / LANDING SCREEN
  ========================================================= */
  #landing{
    height:100vh; padding:0; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(circle at 50% 30%, var(--maroon) 0%, var(--maroon-dark) 75%);
  }
  .envelope-wrap{ text-align:center; color:var(--gold-light); cursor:pointer; user-select:none; }
  .envelope{
    position:relative; width:260px; height:180px; margin:0 auto 28px;
  }
  .env-back{
    position:absolute; inset:0; background:linear-gradient(135deg,#8a2836,#5c1622);
    border:2px solid var(--gold); border-radius:6px;
  }
  .env-flap{
    position:absolute; top:0; left:0; width:100%; height:100%;
    background:linear-gradient(135deg,#a3364a,#6d1f2b);
    clip-path:polygon(0 0,100% 0,50% 62%);
    border-radius:6px 6px 0 0;
    transform-origin:top center;
    transition:transform 1s ease;
    border:2px solid var(--gold);
    z-index:3;
  }
  .env-card{
    position:absolute; left:8%; bottom:-10px; width:84%; height:70%;
    background:var(--blush); border:1px solid var(--gold);
    border-radius:4px; box-shadow:0 6px 18px rgba(0,0,0,.35);
    transition:transform 1s ease .15s; z-index:2;
    display:flex; align-items:center; justify-content:center;
    font-family:'Mrs Saint Delafield', cursive; color:var(--maroon); font-size:28px; padding:10px;
  }
  .envelope-wrap.open .env-flap{ transform:rotateX(180deg); }
  .envelope-wrap.open .env-card{ transform:translateY(-120px); }
  .tap-hint{ font-size:14px; letter-spacing:2px; text-transform:uppercase; opacity:.85; }
  .tap-hint span{ display:inline-block; animation:pulse 1.6s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{opacity:.5;} 50%{opacity:1;} }

  /* =========================================================
     2. GANESHA INVOCATION + MAIN INVITE CARD
  ========================================================= */
  #invite{ background:var(--blush); }
  .om{ font-size:34px; color:var(--gold); margin-bottom:6px; }
  .invocation{ font-size:15px; letter-spacing:1px; color:var(--maroon); margin-bottom:26px; font-:italic; }
  .invite-heading{ font-size:16px; letter-spacing:3px; text-transform:uppercase; color:var(--maroon); margin-bottom:14px; }
  .names{ font-size:52px; color:var(--maroon); line-height:1.3; }
  .names small{ display:block; font-family:'Cormorant Garamond',serif; font-size:16px; letter-spacing:1px; color:#7a5240; margin:2px 0 14px; }
  .amp{ font-size:26px; color:var(--gold); margin:6px 0; font-family:'Cormorant Garamond', serif; font-:italic; }
  .invited-by{ margin-top:26px; font-size:14px; color:#7a5240; }

  /* =========================================================
     3. SCRATCH CARD — SAVE THE DATE + COUNTDOWN
  ========================================================= */
  #savedate{ background:var(--cream); }
  .scratch-title{ font-size:34px; color:var(--maroon); margin-bottom:6px; }
  .scratch-sub{ font-size:13px; letter-spacing:1px; color:#8a6a55; margin-bottom:26px; text-transform:uppercase; }
  .scratch-box{
    position:relative; width:280px; height:170px; margin:0 auto 30px;
    border-radius:14px; overflow:hidden; border:2px solid var(--gold);
    box-shadow:0 8px 24px rgba(109,31,43,.18);
  }
  .scratch-reveal{
    position:absolute; inset:0; background:var(--blush);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-family:'Cormorant Garamond', serif; color:var(--maroon);
  }
  .scratch-reveal .day{ font-size:56px; line-height:1; font-weight:600; }
  .scratch-reveal .month{ font-size:20px; letter-spacing:3px; text-transform:uppercase; }
  .scratch-reveal .year{ font-size:14px; color:#7a5240; margin-top:4px; }
  .scratch-canvas{ position:absolute; inset:0; z-index:2; touch-action:none; }
  .scratch-hint{ font-size:12px; color:#8a6a55; margin-top:-14px; margin-bottom:26px; letter-spacing:1px; }

  .countdown{ display:flex; justify-content:center; gap:14px; flex-wrap:wrap; }
  .cd-box{
    background:var(--maroon); color:var(--gold-light); border-radius:10px;
    width:64px; padding:10px 0; font-family:'Cormorant Garamond', serif;
  }
  .cd-box .num{ font-size:24px; font-weight:600; }
  .cd-box .label{ font-size:9px; letter-spacing:1px; text-transform:uppercase; opacity:.85; }

  /* =========================================================
     4. CEREMONY DETAILS
  ========================================================= */
  #details{ background:var(--blush); }
  .section-title{ font-size:32px; color:var(--maroon); margin-bottom:34px; }
  .detail-card{
    background:var(--cream); border:1px solid var(--gold); border-radius:14px;
    max-width:340px; margin:0 auto 20px; padding:22px 20px;
    box-shadow:0 6px 16px rgba(109,31,43,.10);
  }
  .detail-card .icon{ font-size:26px; color:var(--gold); margin-bottom:8px; }
  .detail-card h3{ font-family:'Cormorant Garamond', serif; font-size:22px; color:var(--maroon); margin-bottom:4px; }
  .detail-card p{ font-size:13.5px; color:#6b4d3e; line-height:1.5; }
  .map-btn{
    display:inline-block; margin-top:12px; padding:8px 18px; border-radius:30px;
    background:var(--maroon); color:var(--gold-light); text-decoration:none; font-size:12px;
    letter-spacing:1px; text-transform:uppercase;
  }

  /* =========================================================
     5. GALLERY
  ========================================================= */
  #gallery{ background:var(--cream); }
 .gallery-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  width:100%;
  max-width:340px;
  margin:0 auto;
  box-sizing:border-box;
}
  .gallery-grid div{
    aspect-ratio:1/1; border-radius:2px; border:1px solid var(--gold);
    background:linear-gradient(135deg,#f0d7c9,#e8bfae);
    display:flex; align-items:center; justify-content:center;
    font-size:11px; color:#8a5c46; text-align:center; padding:6px;
  
  }

    .gallery-grid div img{
  width:100%;
  height:125%;
  object-fit:cover;
  border-radius:2px;
}

  /* =========================================================
     6. RSVP
  ========================================================= */
  #rsvp{ background:var(--maroon); color:var(--gold-light); }
  #rsvp .section-title{ color:var(--gold-light); }
  #rsvp p{ font-size:14px; margin-bottom:24px; opacity:.9; }
  .rsvp-btn{
    display:inline-block; margin:6px; padding:14px 30px; border-radius:30px;
    background:var(--gold); color:var(--maroon-dark); text-decoration:none;
    font-weight:600; letter-spacing:1px; font-size:13px; text-transform:uppercase;
  }
  footer{ background:var(--maroon-dark); color:var(--gold-light); text-align:center; padding:24px; font-size:12px; letter-spacing:1px; }
</>
</head>
<body>

<!-- ambient falling petals -->
<div class="petals" id="petals"></div>

<!-- =========================================================
     1. ENVELOPE LANDING
========================================================= -->
<section id="landing">
  <div class="envelope-wrap" id="envelopeWrap" onclick="openEnvelope()">
    <div class="envelope">
      <div class="env-back"></div>
      <div class="env-card">Aishwarya &amp; Harsh</div> <!-- EDIT: names shown on the card -->
      <div class="env-flap"></div>
    </div>
    <div class="tap-hint"><span>Tap to open your invite</span></div>
  </div>
</section>

<!-- =========================================================
     2. GANESHA INVOCATION + MAIN INVITE
========================================================= -->
<section id="invite">
  <svg class="motif tl" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="none" stroke="#c9a24a" stroke-width="2"/><circle cx="50" cy="50" r="30" fill="none" stroke="#c9a24a" stroke-width="1.5"/></svg>
  <svg class="motif tr" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="none" stroke="#c9a24a" stroke-width="2"/><circle cx="50" cy="50" r="30" fill="none" stroke="#c9a24a" stroke-width="1.5"/></svg>

  <div class="om">🕉</div>
  <p class="invocation">|| Shree Ganeshay Namah ||</p> <!-- EDIT: change invocation line if you like -->

  <p class="invite-heading">Together with their families</p>
  <p ="font-size:14px; color:#7a5240; margin-bottom:22px;">we joyfully invite you to the Ring Ceremony of</p>

  <div class="names">
    Aishwarya Dwivedi <!-- EDIT: bride's name -->
    <small>D/o Ekta Dwivedi &amp; Shree Manjul Dwivedi</small> <!-- EDIT: bride's parents -->
  </div>
  <div class="amp">&amp;</div>
  <div class="names">
    Harsh Dubey <!-- EDIT: groom's name -->
    <small>S/o Pratibha Dubey &amp; Shree N.K Dubey</small> <!-- EDIT: groom's parents -->
  </div>

  <p class="invited-by">With the blessings of the family &nbsp;•&nbsp; Invited by Dubey Family</p> <!-- EDIT -->
</section>

<!-- =========================================================
     3. SCRATCH CARD DATE REVEAL + COUNTDOWN
========================================================= -->
<section id="savedate">
  <p class="script scratch-title">Reveal the Date</p>
  <p class="scratch-sub">Scratch the card below</p>

  <div class="scratch-box">
    <div class="scratch-reveal">
      <div class="day">21</div> <!-- EDIT: day -->
      <div class="month">November</div> <!-- EDIT: month -->
      <div class="year">2026 &nbsp;•&nbsp; Saturday</div> <!-- EDIT: year / weekday -->
    </div>
    <canvas class="scratch-canvas" id="scratchCanvas"></canvas>
  </div>
  <p class="scratch-hint">(swipe with your finger / mouse)</p>

  <div class="countdown" id="countdown">
    <div class="cd-box"><div class="num" id="cd-days">--</div><div class="label">Days</div></div>
    <div class="cd-box"><div class="num" id="cd-hours">--</div><div class="label">Hours</div></div>
    <div class="cd-box"><div class="num" id="cd-mins">--</div><div class="label">Mins</div></div>
    <div class="cd-box"><div class="num" id="cd-secs">--</div><div class="label">Secs</div></div>
  </div>
</section>

<!-- =========================================================
     4. CEREMONY DETAILS
========================================================= -->
<section id="details">
  <svg class="motif tl" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="none" stroke="#c9a24a" stroke-width="2"/></svg>
  <svg class="motif tr" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="none" stroke="#c9a24a" stroke-width="2"/></svg>
  <p class="section-title serif">Ring Ceremony</p>

  <div class="detail-card">
    <div class="icon">🕐</div>
    <h3>Time</h3>
    <p>Saturday, 21th November 2026 <br> 4:30 PM onwards</p> <!-- EDIT -->
  </div>

  <div class="detail-card">
    <div class="icon">📍</div>
    <h3>Venue</h3>
    <p>Leluxe Banquets, Gwal Pahari</p> <!-- EDIT: venue address -->
    <a class="map-btn" href="https://share.google/b1OspWPbQnjGvb1lV" target="_blank">View on Map</a> <!-- EDIT: paste your Google Maps link -->
  </div>

  <div class="detail-card">
    <div class="icon">👗</div>
    <h3>Dress Code</h3>
    <p>Traditional &amp; Ethnic </p> <!-- EDIT -->
  </div>
</section>

<!-- =========================================================
     5. GALLERY (replace divs with <img> tags of your photos)
========================================================= -->
<section id="gallery">
  <p class="section-title serif">Sweet Moments</p>
  <div class="gallery-grid">
    <div><img src="photo1.jpeg" alt="Sweet moment 1"></div>
    <div><img src="photo2.jpeg" alt="Sweet moment 2"></div>
  </div>
</section>

<!-- =========================================================
     6. RSVP
========================================================= -->
<section id="rsvp">
  <p class="section-title serif">RSVP</p>
  <p>We can't wait to celebrate this beautiful beginning with you. for more details you can connect with us by clicking on below buttons<br></p>
  <a class="rsvp-btn" href="https://wa.me/918826115990?text=I%20will%20be%20joining%20the%20Ring%20Ceremony!"> WhatsApp</a> <!-- EDIT: your WhatsApp number -->
  <a class="rsvp-btn" href="tel:+918826115990">Call </a> <!-- EDIT: your phone number -->
</section>

<footer>Made with love for Aishwarya &amp; Harsh's Ring Ceremony</footer> <!-- EDIT -->

<script>
  /* ---------- ambient falling petals ---------- */
  const petalHost = document.getElementById('petals');
  const glyphs = ['✿','❀','✾'];
  for(let i=0;i<18;i++){
    const p = document.createElement('div');
    p.className='petal';
    p.textContent = glyphs[i % glyphs.length];
    p..left = Math.random()*100 + 'vw';
    p..animationDuration = (8 + Math.random()*10) + 's';
    p..animationDelay = (Math.random()*10) + 's';
    p..fontSize = (14 + Math.random()*14) + 'px';
    petalHost.appendChild(p);
  }

  /* ---------- envelope open ---------- */
  function openEnvelope(){
    const wrap = document.getElementById('envelopeWrap');
    wrap.classList.add('open');
    setTimeout(()=>{
      document.getElementById('invite').scrollIntoView({behavior:'smooth'});
    }, 900);
  }

  /* ---------- scratch card ---------- */
  const canvas = document.getElementById('scratchCanvas');
  const ctx = canvas.getContext('2d');
  function sizeCanvas(){
    const box = canvas.parentElement.getBoundingClientRect();
    canvas.width = box.width;
    canvas.height = box.height;
    ctx.fill = '#c9a24a';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fill = '#6d1f2b';
    ctx.font = '600 16px Poppins, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('SCRATCH HERE', canvas.width/2, canvas.height/2 - 8);
    ctx.font = '13px Poppins, sans-serif';
    ctx.fillText('to reveal the date', canvas.width/2, canvas.height/2 + 14);
  }
  sizeCanvas();
  window.addEventListener('resize', sizeCanvas);

  let scratching = false;
  function scratchAt(x,y){
    const rect = canvas.getBoundingClientRect();
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc(x-rect.left, y-rect.top, 22, 0, Math.PI*2);
    ctx.fill();
  }
  canvas.addEventListener('mousedown', e=>{scratching=true; scratchAt(e.clientX,e.clientY);});
  canvas.addEventListener('mousemove', e=>{ if(scratching) scratchAt(e.clientX,e.clientY); });
  window.addEventListener('mouseup', ()=> scratching=false);
  canvas.addEventListener('touchstart', e=>{ scratching=true; const t=e.touches[0]; scratchAt(t.clientX,t.clientY); }, {passive:true});
  canvas.addEventListener('touchmove', e=>{ if(scratching){ const t=e.touches[0]; scratchAt(t.clientX,t.clientY);} }, {passive:true});
  canvas.addEventListener('touchend', ()=> scratching=false);

  /* ---------- countdown ----------
     EDIT: set the exact ceremony date/time here (YYYY, MonthIndex(0-11), Day, Hour, Min)
  */
  const eventDate = new Date(2026, 10, 25, 18, 0, 0); // 21 Nov 2026, 4:30 PM
  function updateCountdown(){
    const now = new Date();
    let diff = eventDate - now;
    if(diff < 0) diff = 0;
    const d = Math.floor(diff/(1000*60*60*24));
    const h = Math.floor((diff/(1000*60*60))%24);
    const m = Math.floor((diff/(1000*60))%60);
    const s = Math.floor((diff/1000)%60);
    document.getElementById('cd-days').textContent = d;
    document.getElementById('cd-hours').textContent = h;
    document.getElementById('cd-mins').textContent = m;
    document.getElementById('cd-secs').textContent = s;
  }
  updateCountdown();
  setInterval(updateCountdown, 1000);
</script>
</body>
</html>
